name: Deploy Drupal PHP to Azure VM

on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest

    steps:
      # ── 0. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Configure SSH agent ────────────────────────────────────
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      # ── 2. Add VM to known hosts ──────────────────────────────────
      - name: Add VM to known hosts
        env:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
        run: |
          PORT=${SSH_PORT:-22}
          ssh-keyscan -T 10 -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      # ── 3. Deploy files via rsync ─────────────────────────────────
      - name: Deploy files via rsync
        env:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT=${SSH_PORT:-22}
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='sites/default/settings.php' \
            --exclude='sites/default/files/' \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no" \
            ./ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
