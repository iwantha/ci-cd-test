name: Test SSH Connectivity

on:
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      # ── 0. Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for rsync diffs
          
      # ── 1. Set up SSH ─────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEV_SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 2. Sync files to Azure VM via rsync over SSH ──────────────
      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='sites/default/settings.php' \
            --exclude='sites/default/files/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEV_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      
