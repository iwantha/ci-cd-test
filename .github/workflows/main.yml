name: Deploy to Dev Server
on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
jobs:
  deploy:
    name: SSH Deploy + Drush
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      - name: Add VM to known hosts
        env:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
        run: |
          PORT=${SSH_PORT:-22}
          ssh-keyscan -T 10 -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
      - name: Pull code on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          script: |
            set -e
            git config --global --add safe.directory /home/httpd/com-d10.wso2.com/wso2-website-drupal10
            cd /home/httpd/com-d10.wso2.com/wso2-website-drupal10
            echo "==> Pulling latest code from dev..."
            git pull origin dev
