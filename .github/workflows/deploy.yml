name: Deploy to Dev Server
on:
  push:
    branches:
      - dev
      - main
jobs:
  deploy:
    name: SSH Deploy + Drush
    runs-on: ubuntu-latest
    steps:
      # ── 1. Pull latest code ───────────────────────────────────────────────────
      - name: Pull code on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.212.118.164
          username: wso2
          key: -----BEGIN OPENSSH PRIVATE KEY----------END OPENSSH PRIVATE KEY-----
          port: 5222
          script: |
            set -e
            cd /home/httpd/ci-cd-test
            echo "==> Pulling latest code from dev..."
            git pull origin dev
